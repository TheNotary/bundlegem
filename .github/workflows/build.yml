name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Build gem
        run: bundle exec rake build
      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: foobar_templates-gem
          path: pkg/*.gem
          if-no-files-found: error
